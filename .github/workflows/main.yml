name: Continuous Bot Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  host-bot:
    runs-on: ubuntu-latest
    concurrency:
      group: bot-running
      cancel-in-progress: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Dedicated Server
        env:
          PYTHONUNBUFFERED: 1
        run: python main.py
