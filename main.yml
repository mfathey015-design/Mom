name: Hosting Bot 24/7

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/15 * * * *' # يعمل كل 15 دقيقة لضمان عدم توقف السيرفر
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # الصلاحيات ضرورية لعمل Sync للملفات المرفوعة
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # تثبيت المكتبات الأساسية يدوياً لضمان عدم الفشل
          pip install flask python-telegram-bot psutil requests aiohttp

      - name: Run Bot with Auto-Restart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PORT: 8080
        run: |
          # التأكد من وجود الملف قبل التشغيل
          if [ -f "main.py" ]; then
            until python main.py; do
              echo "Process crashed. Restarting in 5 seconds..."
              sleep 5
            done
          else
            echo "Error: main.py not found in $(pwd)"
            ls -R # لعرض الملفات الموجودة في حال فشل العثور على الملف
            exit 1
          fi

      - name: Sync Hosted Projects
        if: always() # لضمان حفظ البيانات حتى لو توقف البوت
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # إضافة المجلد الذي يتم حفظ المشاريع المرفوعة فيه
          git add hosted_projects/ || echo "No hosted_projects folder yet"
          git commit -m "Auto-sync: Saving user uploaded files" || echo "No changes to commit"
          git push origin main
