name: Continuous Bot Hosting
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  host-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install python-telegram-bot flask psutil aiohttp requests
      - run: python main.py
